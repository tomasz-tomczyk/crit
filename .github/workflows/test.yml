name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build Nix package
        id: nix-build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          log_file=$(mktemp)
          nix build . 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          echo "log_file=$log_file" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Report expected Nix vendor hash
        if: steps.nix-build.outcome == 'failure'
        shell: bash
        run: |
          hash=$(grep -oE 'got:[[:space:]]*sha256-[A-Za-z0-9+/=]+' "${{ steps.nix-build.outputs.log_file }}" | sed -E 's/^got:[[:space:]]*//' | tail -n1 || true)

          if [ -n "$hash" ]; then
            echo "Expected vendorHash: $hash"
            echo "::error::Nix vendor hash mismatch. Update flake.nix to use $hash"
            {
              echo "### Nix vendor hash mismatch"
              echo
              echo 'Set `vendorHash` in `flake.nix` to:'
              echo
              echo "\`\`\`nix"
              echo "$hash"
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Nix build failed. Could not extract a replacement vendor hash from the build log."
          fi

          exit 1

      - name: Smoke test Nix app
        if: steps.nix-build.outcome == 'success'
        run: nix run . -- --help

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install npm dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        working-directory: e2e
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: bash run.sh

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 7
