name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Install and run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npx eslint frontend/app.js
      - name: Stylelint
        run: npx stylelint "frontend/*.css"
      - name: CSS variable validation
        run: bash scripts/check-css-vars.sh

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install npm dependencies
        working-directory: e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install chromium

      - name: Install Playwright system dependencies
        working-directory: e2e
        run: npx playwright install-deps chromium

      - name: Build crit with coverage instrumentation
        run: |
          mkdir -p /tmp/crit-coverdir
          go build -cover -o /tmp/crit-cover-bin .

      - name: Run E2E tests
        working-directory: e2e
        run: bash run.sh
        env:
          CRIT_BIN: /tmp/crit-cover-bin
          GOCOVERDIR: /tmp/crit-coverdir

      - name: Convert E2E coverage data
        if: always()
        run: |
          if [ -d /tmp/crit-coverdir ] && ls /tmp/crit-coverdir/*.* >/dev/null 2>&1; then
            go tool covdata textfmt -i=/tmp/crit-coverdir -o=e2e-coverage.out
          fi

      - name: Upload E2E coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: e2e-coverage.out
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 7
